<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/fonts.css">
  <link rel="stylesheet" href="../css/style.css">
  <title>Document</title>
</head>
<body>
  <main>
    <div class="wrapper">
      <div class="conteiner">
        <div class="button_clouds">
          <div class="headder">
            <div class="clouds on">
              <div class="cloud normal_cloud cloud-1"></div>
              <div class="cloud big_cloud cloud-2"></div>
              <div class="cloud small_cloud cloud-3"></div>
              <div class="cloud big_cloud cloud-4"></div>
              <div class="cloud normal_cloud cloud-5"></div>
              <div class="cloud small_cloud cloud-6"></div>
              <div class="cloud normal_cloud cloud-7"></div>
              <div class="cloud big_cloud cloud-8"></div>
              <div class="cloud small_cloud cloud-9"></div>
              <div class="cloud small_cloud cloud-10"></div>
            </div>
            <div class="sun on"></div>
            <div class="stars">
              <div class="stars_wreaper">
              </div>
            </div>
            <div class="moon">
              <div class="moon__yellow"></div>
              <div class="moon__blue"></div>
            </div>
          </div>
          <div class="button">
            <button class="conteiner__button">
              <div class="yellow__ring__button">
                <div class="sun__button"></div>
              </div>
              <div class="text_button">
                <div class="text__hight">DAY TOGGLE</div>
                <div class="text_lower">State icon: Sun</div>
              </div>
            </button>
          </div>
        </div>
        <div class="hills">
          <div class="hills__conteiner">
            <div class="back_hill">
              <div class="ather__hils">
                <div class="mini_hills_conteiner">
                  <div class="hill one__hill"></div>
                  <div class="hill two__hill"></div>
                  <div class="hill three__hill"></div>
                  <div class="hill four__hill"></div>
                  <div class="hill one__hill"></div>
                  <div class="hill two__hill"></div>
                  <div class="hill three__hill"></div>
                  <div class="hill four__hill"></div>
                  <div class="hill one__hill"></div>
                  <div class="hill two__hill"></div>
                  <div class="hill three__hill"></div>
                  <div class="hill four__hill"></div>
                </div>
                <div class="down__hill"></div>
              </div>
              
            </div>
          </div>
        </div>
      </div>
    </div>
    
  </main>
  
  <script src="../js/script.js"></script>
  <script src="../js/script-clouds.js" type = "module"></script>
  <script src="../js/script-stars.js" type = "module"></script>
</body>
</html>
